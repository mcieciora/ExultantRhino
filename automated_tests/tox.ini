[tox]
skipsdist = True
envlist = py310

[testenv:lint]
deps =  pylint
        -r../requirements.txt
commands =  pylint {posargs:py.test} --max-line-length=120 --disable=C0114 --fail-under=8.0

[testenv:database_tests]
deps =  -rtest_req.txt
        -r../requirements.txt
commands =  pytest -k database_tests -v